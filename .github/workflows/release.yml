name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  bump-version-and-tag:
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
      version: ${{ steps.bump.outputs.version }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure git user
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"

      - name: Bump patch version
        id: bump
        run: |
          npm i
          npm version patch --no-git-tag-version
          node scripts/syncVersion.js
          git add package.json README.md src/renderer/index.html
          VERSION="$(node -p "require('./package.json').version")"
          git commit -m "Release: v$VERSION"
          git tag "v$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Push commit + tags to main
        run: git push origin main --follow-tags

  build-and-publish:
    needs: bump-version-and-tag
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm i

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: npx electron-builder --win

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: npx electron-builder --mac

      - name: Organize artifacts for Windows
        if: runner.os == 'Windows'
        run: |
          mkdir -p dist/windows
          Move-Item -Path "dist/*.exe" -Destination "dist/windows/" -ErrorAction SilentlyContinue

      - name: Organize artifacts for macOS
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist/macos
          mv dist/*.zip dist/macos/ 2>/dev/null || true

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump-version-and-tag.outputs.tag }}
          files: |
            dist/windows/*.exe
            dist/macos/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
